<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nimbus Drones - Crear Cuenta</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Conexión del CSS -->
<link rel="stylesheet" href="disenio.css">

</head>

<body>

<header>

<div class="logo">
    <img src="logo.png" alt="Nimbus Logo">
    <span>NIMBUS</span>
</div>

</header>


<main class="login-page">
<section class="login-card">
<h1>Crear Cuenta en Nimbus</h1>
<p>Únete a nuestra plataforma de drones autónomos.</p>

<form class="login-form" id="registerForm">
<label for="registroCorreo">Correo electrónico</label>
<input id="registroCorreo" type="email" placeholder="tu@correo.com" required>

<label for="registroClave">Contraseña</label>
<input id="registroClave" type="password" placeholder="Mínimo 6 caracteres" required>

<label for="registroClaveConfirm">Confirmar Contraseña</label>
<input id="registroClaveConfirm" type="password" placeholder="Repite tu contraseña" required>

<button type="submit">Crear Cuenta</button>

<div id="errorMessage" class="alert alert-danger d-none mt-3" role="alert"></div>
<div id="loadingMessage" class="alert alert-info d-none mt-3" role="alert">Creando tu cuenta...</div>
</form>

<div class="login-footer">
    <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a></p>
</div>

</section>
</main>

<footer>
<p>© 2026 Nimbus Drones</p>
</footer>

</body>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Firebase Auth -->
<script type="module" src="auth.js"></script>

</html>
