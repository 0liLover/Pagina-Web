<section class="hero">

<h1>ENCUESTA DE CALIDAD NIMBUS</h1>
<button type="button">Tu opinión mejora nuestros drones y la web</button>

</section>

<section class="survey-wrap content">
<h2>Queremos conocer tu experiencia</h2>
<p>Responde esta encuesta. No se guardará en base de datos por ahora.</p>

<form class="survey-form" action="#" method="post">
<fieldset>
<legend>Calidad de productos</legend>

<label>¿Qué tan bueno te parece el producto Nimbus que viste?</label>
<div class="survey-options">
<label><input type="radio" name="producto_bueno"> Excelente</label>
<label><input type="radio" name="producto_bueno"> Bueno</label>
<label><input type="radio" name="producto_bueno"> Regular</label>
<label><input type="radio" name="producto_bueno"> Malo</label>
</div>

<label>¿El producto cumple su función principal?</label>
<div class="survey-options">
<label><input type="radio" name="cumple_funcion"> Sí, completamente</label>
<label><input type="radio" name="cumple_funcion"> Parcialmente</label>
<label><input type="radio" name="cumple_funcion"> No</label>
</div>

<label for="recomendarias">¿Recomendarías nuestros productos?</label>
<select id="recomendarias" name="recomendarias">
<option value="">Selecciona una opción</option>
<option>Sí</option>
<option>No</option>
<option>Tal vez</option>
</select>
</fieldset>

<fieldset>
<legend>Experiencia en la página</legend>

<label>¿La página te parece bonita visualmente?</label>
<div class="survey-options">
<label><input type="radio" name="pagina_bonita"> Sí</label>
<label><input type="radio" name="pagina_bonita"> Más o menos</label>
<label><input type="radio" name="pagina_bonita"> No</label>
</div>

<label>¿La navegación te parece intuitiva?</label>
<div class="survey-options">
<label><input type="radio" name="pagina_intuitiva"> Muy intuitiva</label>
<label><input type="radio" name="pagina_intuitiva"> Aceptable</label>
<label><input type="radio" name="pagina_intuitiva"> Confusa</label>
</div>

<label for="velocidad">¿Cómo percibes la velocidad del sitio?</label>
<select id="velocidad" name="velocidad">
<option value="">Selecciona una opción</option>
<option>Muy rápida</option>
<option>Rápida</option>
<option>Normal</option>
<option>Lenta</option>
</select>

<label for="comentarios">Comentarios o sugerencias</label>
<textarea id="comentarios" name="comentarios" rows="5" placeholder="Cuéntanos qué mejorarías en productos o en la página..."></textarea>
</fieldset>

<button type="button" class="survey-submit">Enviar encuesta</button>
</form>
</section>
